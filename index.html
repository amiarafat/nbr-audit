<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBR Audit Checker 2023-24 | Fixed AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACPKSjZoziLx221xbi9i3VNutmOsRzmEw",
            authDomain: "nbr-audit-checker.firebaseapp.com",
            projectId: "nbr-audit-checker",
            storageBucket: "nbr-audit-checker.firebasestorage.app",
            messagingSenderId: "150898490409",
            appId: "1:150898490409:web:b2fb490143166ea6647038"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.fbMethods = { doc, getDoc, setDoc, updateDoc, increment, onSnapshot, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- CONFIGURATION ---
        const MODEL_NAME = "gemini-1.5-flash"; // AI Studio-র সাধারণ মডেল
        const GITHUB_DATA_URL = "https://raw.githubusercontent.com/amiarafat/nbr-audit/refs/heads/main/audit_selection_2023_24.json";

        function App() {
            const [auditMap, setAuditMap] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedResult, setSelectedResult] = useState(null);
            const [isSearching, setIsSearching] = useState(false);
            const [error, setError] = useState(null);
            const [aiKey, setAiKey] = useState("");
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isAiTyping, setIsAiTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                const { firebaseAuth, firebaseDB, fbMethods } = window;
                if (!firebaseAuth) return;

                fbMethods.signInAnonymously(firebaseAuth).then(() => {
                    const keyDocRef = fbMethods.doc(firebaseDB, 'artifacts', 'nbr-audit-v1', 'public', 'data', 'api_keys', 'gemini');
                    fbMethods.getDoc(keyDocRef).then(snap => {
                        if (snap.exists()) setAiKey(snap.data().key);
                    });
                });

                fetch(GITHUB_DATA_URL)
                    .then(res => res.json())
                    .then(data => {
                        const lookup = new Map();
                        data.entries.forEach(e => lookup.set(String(e.tin).trim(), e));
                        setAuditMap(lookup);
                        setTimeout(() => lucide.createIcons(), 100);
                    });
            }, []);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages, isAiTyping]);

            const handleSearch = () => {
                const tin = searchTerm.replace(/\D/g, '').trim();
                if (tin.length !== 12) { setError("সঠিক ১২ ডিজিটের TIN দিন।"); return; }
                setIsSearching(true);
                setError(null);
                setTimeout(() => {
                    const result = auditMap?.get(tin);
                    if (result) setSelectedResult(result);
                    else setError("এই TIN নাম্বারটি তালিকায় নেই।");
                    setIsSearching(false);
                    setTimeout(() => lucide.createIcons(), 50);
                }, 600);
            };

            const handleAiChat = async () => {
                if (!userInput.trim() || !aiKey) return;
                const msg = userInput;
                setUserInput('');
                setChatMessages(prev => [...prev, { role: 'user', text: msg }]);
                setIsAiTyping(true);

                // Exponential Backoff Fetch
                const fetchWithRetry = async (url, options, retries = 3) => {
                    for (let i = 0; i < retries; i++) {
                        try {
                            const res = await fetch(url, options);
                            const json = await res.json();
                            if (res.ok) return json;
                            if (json.error?.message?.includes("not found")) throw new Error("MODEL_NOT_FOUND");
                        } catch (e) {
                            if (i === retries - 1) throw e;
                            await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
                        }
                    }
                };

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${aiKey}`;
                    const data = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: msg }] }],
                            systemInstruction: { parts: [{ text: "আপনি একজন এনবিআর ট্যাক্স বিশেষজ্ঞ। বাংলায় উত্তর দিন।" }] }
                        })
                    });

                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "দুঃখিত, কোনো উত্তর পাওয়া যায়নি।";
                    setChatMessages(prev => [...prev, { role: 'assistant', text: reply }]);
                } catch (e) {
                    let errorMsg = "দুঃখিত, এআই সার্ভারে সমস্যা হচ্ছে।";
                    if (e.message === "MODEL_NOT_FOUND") errorMsg = `ত্রুটি: ${MODEL_NAME} মডেলটি আপনার এপিআই কী-এর সাথে কাজ করছে না। আইটি অ্যাডমিনকে জানান।`;
                    setChatMessages(prev => [...prev, { role: 'assistant', text: errorMsg }]);
                } finally {
                    setIsAiTyping(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="glass-effect sticky top-0 z-50 border-b p-4 flex justify-between items-center px-8">
                        <div className="flex items-center gap-2 font-black text-xl">
                            <div className="bg-emerald-600 text-white p-2 rounded-lg"><i data-lucide="shield-check"></i></div>
                            NBR AUDIT <span className="text-emerald-600">CHECKER</span>
                        </div>
                    </nav>

                    <div className="max-w-3xl mx-auto mt-20 px-6 text-center">
                        <h1 className="text-4xl font-black mb-4">আপনার TIN যাচাই করুন</h1>
                        <div className="bg-white p-2 rounded-full shadow-xl border flex items-center mb-8">
                            <input 
                                className="flex-1 px-6 py-4 outline-none font-mono text-lg" 
                                placeholder="১২ ডিজিটের TIN লিখুন..." 
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                            <button onClick={handleSearch} className="bg-emerald-600 text-white px-8 py-4 rounded-full font-bold hover:bg-emerald-700 transition-all">
                                {isSearching ? "চেক করা হচ্ছে..." : "যাচাই করুন"}
                            </button>
                        </div>
                        {error && <p className="text-red-500 font-bold bg-red-50 p-3 rounded-xl">{error}</p>}

                        {selectedResult && (
                            <div className="bg-white border-2 border-red-500 rounded-[2rem] p-8 mt-10 shadow-2xl text-left animate-bounce-short">
                                <div className="flex items-center gap-4 text-red-600 mb-4">
                                    <i data-lucide="alert-circle" className="w-10 h-10"></i>
                                    <h2 className="text-2xl font-black">অডিট সিলেকশন কনফার্মড!</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-50 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 font-bold uppercase">TIN</p>
                                        <p className="text-xl font-mono font-bold">{selectedResult.tin}</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 font-bold uppercase">Serial</p>
                                        <p className="text-xl font-mono font-bold">#{selectedResult.serial}</p>
                                    </div>
                                    <div className="col-span-2 bg-emerald-50 p-4 rounded-2xl">
                                        <p className="text-xs text-emerald-600 font-bold uppercase">Tax Zone</p>
                                        <p className="text-lg font-bold">{selectedResult.zone}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Chat Widget */}
                    <div className={`fixed bottom-6 right-6 z-[100] ${isChatOpen ? 'w-[380px]' : 'w-16 h-16'}`}>
                        {isChatOpen ? (
                            <div className="bg-white h-[550px] rounded-3xl shadow-2xl border flex flex-col overflow-hidden">
                                <div className="bg-slate-900 p-5 text-white flex justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center"><i data-lucide="bot"></i></div>
                                        <span className="font-bold">Tax Expert AI</span>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)}><i data-lucide="x"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 chat-scroll">
                                    {chatMessages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${m.role === 'user' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-800'}`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isAiTyping && <div className="text-xs text-slate-400 animate-pulse">AI উত্তর লিখছে...</div>}
                                    <div ref={chatEndRef}></div>
                                </div>
                                <div className="p-4 border-t flex gap-2">
                                    <input 
                                        className="flex-1 bg-slate-100 rounded-xl px-4 py-2 outline-none text-sm" 
                                        placeholder="প্রশ্ন করুন..." 
                                        value={userInput}
                                        onChange={e => setUserInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleAiChat()}
                                    />
                                    <button onClick={handleAiChat} className="bg-emerald-600 text-white p-2 rounded-xl"><i data-lucide="send"></i></button>
                                </div>
                            </div>
                        ) : (
                            <button onClick={() => setIsChatOpen(true)} className="w-full h-full bg-slate-900 text-white rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-all">
                                <i data-lucide="message-square"></i>
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
