<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBR Audit Checker 2023-24</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Configuration
        const GITHUB_DATA_URL = "https://raw.githubusercontent.com/amiarafat/nbr-audit/refs/heads/main/audit_selection_2023_24.json";
        const API_KEY = "AIzaSyBpCHIzi5eop3Ippcw0s1Ui80x5F63TneQ"; // Your provided key

        function App() {
            const [auditMap, setAuditMap] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedResult, setSelectedResult] = useState(null);
            const [isSearching, setIsSearching] = useState(false);
            const [error, setError] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [dataSource, setDataSource] = useState('Initializing...');
            
            // AI Chat State
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isAiTyping, setIsAiTyping] = useState(false);
            const chatEndRef = useRef(null);

            const indexData = (entries) => {
                const lookup = new Map();
                entries.forEach(entry => {
                    if (entry.tin) lookup.set(String(entry.tin).trim(), entry);
                });
                setAuditMap(lookup);
            };

            useEffect(() => {
                const autoLoad = async () => {
                    try {
                        const response = await fetch(GITHUB_DATA_URL);
                        if (!response.ok) throw new Error("Fetch Failed");
                        const data = await response.json();
                        if (data && data.entries) {
                            indexData(data.entries);
                            setDataSource(`Connected: ${data.entries.length.toLocaleString()} Records`);
                            setError(null);
                        }
                    } catch (err) {
                        setDataSource('Error loading data');
                        setError("ডাটাবেস লোড করতে সমস্যা হয়েছে।");
                    } finally {
                        setIsLoadingData(false);
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                };
                autoLoad();
            }, []);

            useEffect(() => {
                if (isChatOpen) {
                    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages, isAiTyping]);

            const callGemini = async (prompt, systemContext = "") => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: `You are a helpful NBR (National Board of Revenue) Tax Assistant. Use Bengali for communication. ${systemContext}` }] }
                };

                let retries = 3;
                let delay = 1000;

                while (retries > 0) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error("API Request Failed");
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (e) {
                        retries--;
                        if (retries === 0) throw e;
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
            };

            const handleAiChat = async () => {
                if (!userInput.trim()) return;
                const message = userInput;
                setUserInput('');
                setChatMessages(prev => [...prev, { role: 'user', text: message }]);
                setIsAiTyping(true);

                try {
                    const context = selectedResult 
                        ? `The user's TIN is ${selectedResult.tin} and they are selected for audit in ${selectedResult.zone}. Guide them on what to do next.`
                        : "The user is checking if they are in the tax audit list.";
                    
                    const response = await callGemini(message, context);
                    setChatMessages(prev => [...prev, { role: 'assistant', text: response }]);
                } catch (e) {
                    setChatMessages(prev => [...prev, { role: 'assistant', text: "দুঃখিত, এআই সার্ভারে সংযোগ করা যাচ্ছে না।" }]);
                } finally {
                    setIsAiTyping(false);
                }
            };

            const performSearch = () => {
                const cleanTin = searchTerm.replace(/\D/g, '').trim();
                if (cleanTin.length !== 12) {
                    setError("সঠিকভাবে ১২ ডিজিটের টিআইএন (TIN) প্রদান করুন।");
                    return;
                }
                setIsSearching(true);
                setError(null);
                setSelectedResult(null);
                
                setTimeout(() => {
                    if (auditMap?.has(cleanTin)) {
                        const result = auditMap.get(cleanTin);
                        setSelectedResult(result);
                        setChatMessages([{ 
                            role: 'assistant', 
                            text: `আসসালামু আলাইকুম। আপনার টিআইএন (${result.tin}) অডিট তালিকায় পাওয়া গেছে। আপনি কি জানতে চান এরপর আপনার করণীয় কী? ✨` 
                        }]);
                    } else {
                        setError("এই টিআইএন নাম্বারটি ২০২৩-২৪ অডিট তালিকায় পাওয়া যায়নি।");
                    }
                    setIsSearching(false);
                    setTimeout(() => lucide.createIcons(), 50);
                }, 150);
            };

            return (
                <div className="min-h-screen pb-20 relative overflow-x-hidden">
                    {/* Background */}
                    <div className="fixed inset-0 pointer-events-none -z-10">
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-100/40 rounded-full blur-[120px]"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-100/40 rounded-full blur-[120px]"></div>
                    </div>

                    <header className="pt-20 pb-12 px-6 text-center max-w-4xl mx-auto">
                        <div className="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 border border-emerald-200">
                             <span className="relative flex h-2 w-2">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                             </span>
                             {isLoadingData ? "লোড হচ্ছে..." : dataSource}
                        </div>
                        <h1 className="text-6xl md:text-8xl font-black text-slate-950 mb-6 tracking-tighter leading-none">
                            অডিট <span className="text-emerald-600">চেকার</span>
                        </h1>
                        <p className="text-slate-500 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed">
                            ২০২৩-২৪ অর্থ-বছরের অডিট নির্বাচনের তালিকা অনুসন্ধান করুন।
                        </p>
                    </header>

                    <main className="max-w-3xl mx-auto px-6 relative z-10">
                        <div className="bg-white p-2 rounded-[2.5rem] shadow-2xl border border-slate-100 mb-10 flex flex-col md:flex-row items-center gap-2 transition-all focus-within:ring-4 focus-within:ring-emerald-50">
                            <div className="flex-1 flex items-center w-full px-6">
                                <div className="text-slate-300 mr-3">
                                    <i data-lucide="hash" className="w-6 h-6"></i>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="১২ ডিজিটের টিআইএন দিন..."
                                    className="w-full py-5 text-2xl outline-none font-mono font-black text-slate-800"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && performSearch()}
                                />
                            </div>
                            <button 
                                onClick={performSearch}
                                disabled={isLoadingData || isSearching}
                                className="w-full md:w-auto bg-slate-950 hover:bg-emerald-600 text-white font-black px-12 py-5 rounded-[2rem] transition-all"
                            >
                                {isSearching ? "খোঁজা হচ্ছে..." : "সার্চ করুন"}
                            </button>
                        </div>

                        {error && (
                            <div className="bg-white p-12 rounded-[3.5rem] border border-slate-100 shadow-xl text-center animate-in fade-in zoom-in-95">
                                <p className="text-slate-500 font-bold text-xl leading-relaxed">{error}</p>
                            </div>
                        )}

                        {selectedResult && (
                            <div className="bg-white rounded-[4rem] shadow-2xl overflow-hidden border border-red-50 animate-in zoom-in-95 duration-500">
                                <div className="bg-gradient-to-br from-red-600 to-red-700 p-10 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white/20 p-3 rounded-2xl">
                                            <i data-lucide="alert-triangle" className="w-8 h-8"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black tracking-tight">অডিট নির্বাচিত!</h2>
                                            <p className="text-red-100 text-[10px] font-bold uppercase tracking-[0.2em] opacity-80 mt-1">Audit Selection 2023-24</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-4xl font-mono font-black leading-none">{selectedResult.serial}</p>
                                    </div>
                                </div>
                                <div className="p-14 space-y-12">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">TIN Number</span>
                                            <p className="text-5xl font-mono font-black text-slate-900 tracking-tighter">{selectedResult.tin}</p>
                                        </div>
                                        <div>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Tax Zone</span>
                                            <p className="text-2xl font-black text-slate-800 leading-tight">{selectedResult.zone}</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-10 rounded-[3rem] border border-slate-100 text-center">
                                        <p className="text-slate-600 font-bold text-lg mb-4">
                                            অডিট নোটিশের প্রস্তুতির জন্য এআই সহকারীর সাহায্য নিন।
                                        </p>
                                        <button 
                                            onClick={() => setIsChatOpen(true)}
                                            className="bg-emerald-600 text-white px-8 py-3 rounded-full font-black text-sm flex items-center gap-2 mx-auto hover:bg-emerald-700 transition-all shadow-lg"
                                        >
                                            <i data-lucide="sparkles" className="w-4 h-4"></i>
                                            স্মার্ট এআই গাইডেন্স ✨
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Chat Widget */}
                    <div className={`fixed bottom-6 right-6 z-50 flex flex-col items-end transition-all duration-500 ${isChatOpen ? 'w-full max-w-md px-6' : 'w-16'}`}>
                        {isChatOpen ? (
                            <div className="bg-white w-full h-[500px] rounded-[2.5rem] shadow-2xl border border-slate-200 flex flex-col overflow-hidden mb-4 animate-in slide-in-from-bottom-10">
                                <div className="bg-slate-950 p-6 text-white flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500 p-2 rounded-xl">
                                            <i data-lucide="bot" className="w-5 h-5 text-white"></i>
                                        </div>
                                        <h3 className="font-black text-lg">ট্যাক্স এআই সহকারী</h3>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)}>
                                        <i data-lucide="x" className="w-6 h-6 text-slate-400"></i>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-4 chat-scroll">
                                    {chatMessages.map((msg, idx) => (
                                        <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-3xl text-sm font-medium leading-relaxed ${
                                                msg.role === 'user' 
                                                ? 'bg-emerald-600 text-white rounded-tr-none' 
                                                : 'bg-slate-100 text-slate-800 rounded-tl-none'
                                            }`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isAiTyping && (
                                        <div className="flex justify-start">
                                            <div className="bg-slate-100 p-4 rounded-3xl rounded-tl-none animate-pulse">
                                                <div className="flex gap-1">
                                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce"></div>
                                                    <div className="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef}></div>
                                </div>
                                <div className="p-4 border-t border-slate-100">
                                    <div className="flex items-center gap-2 bg-slate-50 rounded-2xl px-4 py-1">
                                        <input 
                                            className="flex-1 bg-transparent border-none outline-none py-3 text-sm font-medium text-slate-700"
                                            placeholder="প্রশ্নটি এখানে লিখুন..."
                                            value={userInput}
                                            onChange={(e) => setUserInput(e.target.value)}
                                            onKeyDown={(e) => e.key === 'Enter' && handleAiChat()}
                                        />
                                        <button 
                                            onClick={handleAiChat}
                                            className="bg-slate-950 text-white p-2 rounded-xl hover:bg-emerald-600 transition-colors disabled:opacity-50"
                                            disabled={!userInput.trim() || isAiTyping}
                                        >
                                            <i data-lucide="send" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <button 
                                onClick={() => setIsChatOpen(true)}
                                className="w-16 h-16 bg-slate-950 rounded-full shadow-2xl flex items-center justify-center text-white hover:bg-emerald-600 transition-all hover:scale-110 active:scale-95"
                            >
                                <i data-lucide="message-square" className="w-8 h-8"></i>
                            </button>
                        )}
                    </div>

                    <footer className="mt-24 text-center px-6 opacity-30">
                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">
                            Source: NBR Audit List 2023-24
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
