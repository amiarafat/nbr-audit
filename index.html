<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এনবিআর অডিট যাচাইকরণ পোর্টাল | অফিশিয়াল ট্র্যাকার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #fcfdfe; color: #1e293b; }
        .stat-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); }
        .info-card { transition: all 0.4s ease; border: 1px solid #f1f5f9; }
        .info-card:hover { border-color: #10b981; background: #f0fdf4; }
        .chat-container { height: 400px; }
        @media (max-width: 640px) { .chat-container { height: 70vh; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACPKSjZoziLx221xbi9i3VNutmOsRzmEw",
            authDomain: "nbr-audit-checker.firebaseapp.com",
            projectId: "nbr-audit-checker",
            storageBucket: "nbr-audit-checker.firebasestorage.app",
            messagingSenderId: "150898490409",
            appId: "1:150898490409:web:b2fb490143166ea6647038"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fb = { db, auth, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, signInAnonymously };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [auditMap, setAuditMap] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);
            
            // AI States
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [geminiApiKey, setGeminiApiKey] = useState("");
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'আসসালামু আলাইকুম! আমি আপনার এনবিআর ট্যাক্স অডিট সহকারী। অডিট সম্পর্কিত যেকোনো প্রশ্ন আমাকে করতে পারেন।' }
            ]);
            const [input, setInput] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const chatEndRef = useRef(null);

            const [liveStats, setLiveStats] = useState({
                totalInFile: 0,
                searches: 0,
                visits: 0
            });

            const appId = "nbr-audit-v1";

            useEffect(() => {
                const { db, auth, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, signInAnonymously } = window.fb;

                const initAuth = async () => {
                    await signInAnonymously(auth);
                    
                    // Fetch Gemini API Key
                    const keyDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'api_keys', 'gemini');
                    try {
                        const keySnap = await getDoc(keyDocRef);
                        if (keySnap.exists()) {
                            setGeminiApiKey(keySnap.data().key);
                        }
                    } catch (e) { console.error("Key Fetch Error", e); }

                    // Analytics
                    const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'analytics', 'global_stats');
                    updateDoc(statsRef, { visits: increment(1) }).catch(() => setDoc(statsRef, { visits: 1, searches: 0 }, { merge: true }));
                    onSnapshot(statsRef, (snap) => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setLiveStats(prev => ({ ...prev, searches: data.searches || 0, visits: data.visits || 0 }));
                        }
                    });
                };

                initAuth();

                fetch("https://raw.githubusercontent.com/amiarafat/nbr-audit/refs/heads/main/audit_selection_2023_24.json")
                    .then(res => res.json())
                    .then(data => {
                        const lookup = new Map();
                        data.entries.forEach(e => lookup.set(String(e.tin).trim(), e));
                        setAuditMap(lookup);
                        setLiveStats(prev => ({ ...prev, totalInFile: data.entries.length }));
                        setTimeout(() => lucide.createIcons(), 100);
                    });
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSearch = async () => {
                const tin = searchTerm.trim();
                if (tin.length !== 12) { setError("অনুগ্রহ করে সঠিক ১২ ডিজিটের টিআইএন (TIN) প্রদান করুন।"); return; }
                setLoading(true);
                setError(null);
                setResult(null);

                const { db, doc, updateDoc, increment } = window.fb;
                const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'analytics', 'global_stats');
                updateDoc(statsRef, { searches: increment(1) });

                setTimeout(() => {
                    const match = auditMap.get(tin);
                    if (match) setResult(match);
                    else setError("দুঃখিত, এই টিআইএন (TIN) নম্বরটি ২০২৩-২৪ অডিট তালিকায় পাওয়া যায়নি।");
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 50);
                }, 600);
            };

            const askGemini = async (userMsg) => {
                const query = userMsg || input;
                if (!query.trim()) return;

                const newMessages = [...messages, { role: 'user', content: query }];
                setMessages(newMessages);
                setInput('');
                setAiLoading(true);

                if (!geminiApiKey) {
                    setMessages([...newMessages, { role: 'assistant', content: "এআই সিস্টেম বর্তমানে অফলাইন। অনুগ্রহ করে কিছুক্ষণ পর চেষ্টা করুন।" }]);
                    setAiLoading(false);
                    return;
                }

                const systemPrompt = "You are an expert Tax Consultant for Bangladesh NBR laws. Answer in Bangla. Be precise and professional.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setMessages([...newMessages, { role: 'assistant', content: text || "দুঃখিত, আমি এই মুহূর্তে উত্তর দিতে পারছি না।" }]);
                } catch (err) {
                    setMessages([...newMessages, { role: 'assistant', content: "সার্ভার সংযোগ বিচ্ছিন্ন হয়েছে।" }]);
                } finally {
                    setAiLoading(false);
                }
            };

            return (
                <div className="min-h-screen">
                    <nav className="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 py-3 px-6 shadow-sm">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-slate-900 text-white p-2 rounded-xl">
                                    <i data-lucide="shield-check" className="w-5 h-5"></i>
                                </div>
                                <span className="font-bold text-lg text-slate-800">এনবিআর অডিট <span className="text-emerald-600">পোর্টাল</span></span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="hidden sm:flex items-center gap-2 text-emerald-600 font-bold text-[10px] bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100 uppercase tracking-tighter">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                    লাইভ ডাটাবেস
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto mt-10 px-6">
                        <div className="text-center mb-8">
                            <h1 className="text-4xl md:text-5xl font-black text-slate-900 mb-3 tracking-tight">
                                অডিট স্ট্যাটাস <span className="text-emerald-600 underline decoration-slate-200 underline-offset-4">যাচাই</span> করুন
                            </h1>
                            <p className="text-slate-500 text-md max-w-xl mx-auto font-medium">
                                ২০২৩-২৪ অর্থবছরের অডিট তালিকায় আপনার টিআইএন আছে কিনা তা সরকারি ডাটাবেস থেকে সাথে সাথে যাচাই করুন।
                            </p>
                        </div>

                        <div className="relative mb-8 max-w-2xl mx-auto">
                            <div className="bg-white p-2 rounded-3xl shadow-xl border border-slate-100 flex flex-col md:flex-row items-center gap-2">
                                <div className="flex-1 flex items-center w-full px-5">
                                    <i data-lucide="hash" className="text-slate-300 mr-3 w-5 h-5"></i>
                                    <input 
                                        className="w-full py-4 text-xl font-bold outline-none text-slate-800 placeholder:text-slate-200"
                                        placeholder="১২ ডিজিটের টিআইএন দিন..."
                                        value={searchTerm}
                                        maxLength={12}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                    />
                                </div>
                                <button 
                                    onClick={handleSearch}
                                    disabled={loading}
                                    className="w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-emerald-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    {loading ? <i data-lucide="loader-2" className="animate-spin w-4 h-4"></i> : <i data-lucide="search" className="w-4 h-4"></i>}
                                    যাচাই করুন
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-white p-5 rounded-2xl stat-card flex items-center gap-4">
                                <div className="bg-blue-50 p-2.5 rounded-xl text-blue-600"><i data-lucide="users" className="w-4 h-4"></i></div>
                                <div>
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">মোট ভিজিট</p>
                                    <h3 className="text-xl font-black text-slate-900">{liveStats.visits.toLocaleString('bn-BD')}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl stat-card flex items-center gap-4">
                                <div className="bg-emerald-50 p-2.5 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-4 h-4"></i></div>
                                <div>
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">টিআইএন সার্চ</p>
                                    <h3 className="text-xl font-black text-slate-900">{liveStats.searches.toLocaleString('bn-BD')}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl stat-card flex items-center gap-4">
                                <div className="bg-amber-50 p-2.5 rounded-xl text-amber-600"><i data-lucide="database" className="w-4 h-4"></i></div>
                                <div>
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">ডাটাবেস সাইজ</p>
                                    <h3 className="text-xl font-black text-slate-900">{liveStats.totalInFile.toLocaleString('bn-BD')}</h3>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-4xl mx-auto min-h-[50px] mb-12">
                            {error && (
                                <div className="bg-slate-100 p-6 rounded-3xl font-bold border border-slate-200 text-center animate-in fade-in slide-in-from-top-2">
                                    <p className="text-slate-600 text-md">{error}</p>
                                </div>
                            )}

                            {result && (
                                <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-red-100 animate-in zoom-in-95 duration-500">
                                    <div className="bg-red-600 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                                        <div className="flex items-center gap-5">
                                            <div className="bg-white/20 p-3 rounded-xl backdrop-blur-md shrink-0">
                                                <i data-lucide="alert-triangle" className="w-8 h-8"></i>
                                            </div>
                                            <div>
                                                <h2 className="text-2xl font-black">অডিট নির্বাচিত!</h2>
                                                <p className="text-red-100 text-[9px] font-bold uppercase tracking-widest">আপনার টিআইএন চূড়ান্ত অডিট তালিকায় আছে</p>
                                            </div>
                                        </div>
                                        <div className="bg-black/10 px-6 py-3 rounded-xl border border-white/10 text-center">
                                            <p className="text-[8px] font-black uppercase opacity-60">তালিকা নম্বর</p>
                                            <p className="text-2xl font-black"># {result.serial.toLocaleString('bn-BD')}</p>
                                        </div>
                                    </div>
                                    <div className="p-10 grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div className="space-y-1">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">টিআইএন নম্বর</p>
                                            <p className="text-4xl font-black text-slate-900">{result.tin}</p>
                                        </div>
                                        <div className="space-y-1">
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">কর সার্কেল / অঞ্চল</p>
                                            <p className="text-xl font-black text-slate-800">{result.zone}</p>
                                        </div>
                                    </div>
                                    <div className="bg-red-50 p-6 border-t border-red-100 text-center">
                                        <button 
                                            onClick={() => { setIsChatOpen(true); askGemini(`আমার টিআইএন ${result.tin} অডিটের জন্য নির্বাচিত হয়েছে। এখন আমি কী করবো?`); }}
                                            className="bg-red-600 text-white text-xs font-black px-6 py-3 rounded-full hover:bg-red-700 transition-all flex items-center gap-2 mx-auto"
                                        >
                                            <i data-lucide="message-square" className="w-4 h-4"></i>
                                            এআই থেকে পরামর্শ নিন
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* অন্যান্য তথ্যাবলীর কার্ড সমূহ */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-16">
                            <div className="bg-white p-8 rounded-[2rem] info-card">
                                <div className="bg-emerald-100 text-emerald-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="file-text" className="w-6 h-6"></i></div>
                                <h4 className="font-black text-lg mb-2">অডিট চেকলিস্ট</h4>
                                <p className="text-sm text-slate-500 font-medium leading-relaxed">অডিটের জন্য প্রয়োজনীয় সব ডকুমেন্ট আগে থেকেই গুছিয়ে রাখুন।</p>
                            </div>
                            <div className="bg-white p-8 rounded-[2rem] info-card">
                                <div className="bg-blue-100 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="calendar" className="w-6 h-6"></i></div>
                                <h4 className="font-black text-lg mb-2">সময়সীমা</h4>
                                <p className="text-sm text-slate-500 font-medium leading-relaxed">নোটিশ পাওয়ার পর নির্দিষ্ট সময়ের মধ্যে জবাব দাখিল করা বাধ্যতামূলক।</p>
                            </div>
                            <div className="bg-white p-8 rounded-[2rem] info-card">
                                <div className="bg-amber-100 text-amber-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="help-circle" className="w-6 h-6"></i></div>
                                <h4 className="font-black text-lg mb-2">কেন অডিট?</h4>
                                <p className="text-sm text-slate-500 font-medium leading-relaxed">র‍্যান্ডম সিলেকশন বা আয়ের তথ্যে গড়মিল থাকলে অডিট হতে পারে।</p>
                            </div>
                            <div className="bg-white p-8 rounded-[2rem] info-card">
                                <div className="bg-purple-100 text-purple-600 w-12 h-12 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="phone" className="w-6 h-6"></i></div>
                                <h4 className="font-black text-lg mb-2">সহযোগিতা</h4>
                                <p className="text-sm text-slate-500 font-medium leading-relaxed">যেকোনো জটিলতায় আপনার কর অঞ্চলের সংশ্লিষ্ট অফিসারের সাথে যোগাযোগ করুন।</p>
                            </div>
                        </div>

                        {/* বিস্তারিত চেকলিস্ট সেকশন */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-20">
                            <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-xl">
                                <h3 className="text-2xl font-black mb-6 flex items-center gap-3">
                                    <i data-lucide="list-checks" className="text-emerald-400"></i>
                                    প্রয়োজনীয় নথিপত্র
                                </h3>
                                <div className="space-y-4">
                                    {["রিটার্ন জমার প্রাপ্তি স্বীকার পত্র", "ব্যাংক বিবরণী (সম্পূর্ণ বছর)", "সম্পত্তির ক্রয়-বিক্রয় দলিল", "বেতন ও ইনক্রিমেন্ট সার্টিফিকেট", "ব্যবসায়িক ক্যাশ বুক ও লেজার"].map((txt, i) => (
                                        <div key={i} className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                                            <i data-lucide="circle-check" className="w-5 h-5 text-emerald-500"></i>
                                            <span className="font-bold text-slate-300">{txt}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm flex flex-col justify-center">
                                <i data-lucide="quote" className="w-10 h-10 text-slate-200 mb-6"></i>
                                <h3 className="text-3xl font-black text-slate-800 mb-4 leading-tight">স্বচ্ছ ট্যাক্স ফাইল অডিট ঝুঁকি কমায়।</h3>
                                <p className="text-slate-500 font-medium text-lg leading-relaxed mb-8">
                                    প্রতি বছর সঠিক সময়ে রিটার্ন জমা দিন এবং আয়ের উৎস স্পষ্টভাবে উল্লেখ করুন। অডিট নিয়ে আতঙ্কিত না হয়ে সঠিক তথ্য দিয়ে সহযোগিতা করুন।
                                </p>
                                <div className="flex items-center gap-4">
                                    <div className="bg-slate-100 p-3 rounded-full"><i data-lucide="info" className="text-slate-400"></i></div>
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest">জাতীয় রাজস্ব বোর্ড (NBR) নির্দেশনা</p>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Floating Chat Interface */}
                    <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
                        {isChatOpen && (
                            <div className="bg-white w-[90vw] sm:w-[380px] rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden mb-4 flex flex-col animate-in slide-in-from-bottom-5 duration-300">
                                <div className="bg-slate-900 p-5 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500 p-2 rounded-xl text-white shadow-lg shadow-emerald-500/30"><i data-lucide="bot" className="w-4 h-4"></i></div>
                                        <div>
                                            <h4 className="font-black text-xs">ট্যাক্স এআই</h4>
                                            <span className="text-[8px] text-emerald-400 uppercase font-black tracking-widest flex items-center gap-1">অনলাইনে আছেন</span>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)} className="hover:bg-white/10 p-2 rounded-full transition-colors"><i data-lucide="x" className="w-4 h-4"></i></button>
                                </div>

                                <div className="chat-container custom-scrollbar overflow-y-auto p-5 space-y-4 bg-slate-50/50">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-2xl text-xs font-semibold shadow-sm leading-relaxed ${
                                                m.role === 'user' 
                                                ? 'bg-slate-900 text-white rounded-tr-none' 
                                                : 'bg-white text-slate-800 border border-slate-100 rounded-tl-none'
                                            }`}>
                                                {m.content}
                                            </div>
                                        </div>
                                    ))}
                                    {aiLoading && <div className="flex justify-start"><div className="bg-white border p-3 rounded-2xl text-[8px] font-black text-emerald-600 animate-pulse uppercase tracking-widest">এআই লিখছে...</div></div>}
                                    <div ref={chatEndRef}></div>
                                </div>

                                <div className="p-4 bg-white border-t border-slate-100">
                                    <div className="flex items-center gap-2 bg-slate-100 rounded-2xl px-4 py-1.5 border border-transparent focus-within:border-emerald-200 transition-all">
                                        <input 
                                            className="flex-1 bg-transparent border-none outline-none py-2 text-xs font-bold"
                                            placeholder="আপনার প্রশ্ন..."
                                            value={input}
                                            onChange={e => setInput(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && askGemini()}
                                        />
                                        <button onClick={() => askGemini()} disabled={aiLoading} className="bg-slate-900 text-white p-2 rounded-xl hover:bg-emerald-600 transition-all shadow-md">
                                            <i data-lucide="send" className="w-3 h-3"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        <button 
                            onClick={() => setIsChatOpen(!isChatOpen)}
                            className="bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3"
                        >
                            <div className="bg-emerald-500 p-2 rounded-full"><i data-lucide="sparkles" className="w-5 h-5"></i></div>
                            {!isChatOpen && <span className="font-black text-xs uppercase tracking-widest pr-2 hidden sm:block">এআই অ্যাসিস্ট্যান্ট</span>}
                        </button>
                    </div>

                    <footer className="mt-10 py-10 border-t border-slate-50 text-center px-6">
                        <div className="max-w-2xl mx-auto space-y-3">
                            <p className="text-[9px] font-black text-slate-300 uppercase tracking-[0.4em]">NBR AUDIT NODE • OFFICIAL VERIFICATION</p>
                            <p className="text-[10px] text-slate-400 font-bold">এটি একটি উন্মুক্ত তথ্য যাচাইকরণ পোর্টাল। সর্বদা এনবিআর-এর দাপ্তরিক চিঠিপত্র অনুসরণ করুন।</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
