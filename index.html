<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBR Audit Checker 2023-24</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Configuration - Updated to your new repo location
        const GITHUB_DATA_URL = "https://raw.githubusercontent.com/amiarafat/nbr-audit/refs/heads/main/audit_selection_2023_24.json";

        function App() {
            const [auditMap, setAuditMap] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedResult, setSelectedResult] = useState(null);
            const [isSearching, setIsSearching] = useState(false);
            const [error, setError] = useState(null);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [dataSource, setDataSource] = useState('Initializing...');

            const indexData = (entries) => {
                const lookup = new Map();
                entries.forEach(entry => {
                    if (entry.tin) lookup.set(String(entry.tin).trim(), entry);
                });
                setAuditMap(lookup);
            };

            useEffect(() => {
                const autoLoad = async () => {
                    try {
                        const response = await fetch(GITHUB_DATA_URL);
                        if (!response.ok) throw new Error("Fetch Failed");
                        const data = await response.json();
                        if (data && data.entries) {
                            indexData(data.entries);
                            setDataSource(`Connected: ${data.entries.length.toLocaleString()} Records`);
                            setError(null);
                        }
                    } catch (err) {
                        setDataSource('Error loading data');
                        setError("ডাটাবেস লোড করতে সমস্যা হয়েছে। আপনার গিটহাব লিঙ্কটি চেক করুন।");
                    } finally {
                        setIsLoadingData(false);
                        // Initialize Lucide icons after DOM update
                        setTimeout(() => lucide.createIcons(), 100);
                    }
                };
                autoLoad();
            }, []);

            const performSearch = () => {
                const cleanTin = searchTerm.replace(/\D/g, '').trim();
                if (cleanTin.length !== 12) {
                    setError("সঠিকভাবে ১২ ডিজিটের টিআইএন (TIN) প্রদান করুন।");
                    return;
                }
                setIsSearching(true);
                setError(null);
                setSelectedResult(null);
                
                // Simulate quick search delay for UX
                setTimeout(() => {
                    if (auditMap?.has(cleanTin)) {
                        setSelectedResult(auditMap.get(cleanTin));
                    } else {
                        setError("এই টিআইএন নাম্বারটি ২০২৩-২৪ অডিট তালিকায় পাওয়া যায়নি।");
                    }
                    setIsSearching(false);
                    setTimeout(() => lucide.createIcons(), 50);
                }, 150);
            };

            return (
                <div className="min-h-screen pb-20 relative overflow-x-hidden">
                    {/* Visual Background Elements */}
                    <div className="fixed inset-0 pointer-events-none -z-10">
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-100/40 rounded-full blur-[120px]"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-100/40 rounded-full blur-[120px]"></div>
                    </div>

                    <header className="pt-20 pb-12 px-6 text-center max-w-4xl mx-auto">
                        <div className="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 border border-emerald-200">
                             <span className="relative flex h-2 w-2">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                             </span>
                             {isLoadingData ? "লোড হচ্ছে..." : dataSource}
                        </div>
                        <h1 className="text-6xl md:text-8xl font-black text-slate-950 mb-6 tracking-tighter leading-none">
                            অডিট <span className="text-emerald-600">চেকার</span>
                        </h1>
                        <p className="text-slate-500 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed">
                            ২০২৩-২৪ অর্থ-বছরের অডিট নির্বাচনের তালিকা অনুসন্ধান করুন। আপনার টিআইএন দিয়ে দ্রুত যাচাই সম্পন্ন করুন।
                        </p>
                    </header>

                    <main className="max-w-3xl mx-auto px-6 relative z-10">
                        <div className="bg-white p-2 rounded-[2.5rem] shadow-2xl border border-slate-100 mb-10 flex flex-col md:flex-row items-center gap-2 transition-all focus-within:ring-4 focus-within:ring-emerald-50">
                            <div className="flex-1 flex items-center w-full px-6">
                                <div className="text-slate-300 mr-3">
                                    <i data-lucide="hash" className="w-6 h-6"></i>
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="১২ ডিজিটের টিআইএন (TIN) দিন..."
                                    className="w-full py-5 text-2xl outline-none font-mono font-black text-slate-800 placeholder:font-sans placeholder:text-slate-200"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && performSearch()}
                                />
                            </div>
                            <button 
                                onClick={performSearch}
                                disabled={isLoadingData || isSearching}
                                className="w-full md:w-auto bg-slate-950 hover:bg-emerald-600 text-white font-black px-12 py-5 rounded-[2rem] transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2"
                            >
                                {isSearching ? "খোঁজা হচ্ছে..." : "সার্চ করুন"}
                            </button>
                        </div>

                        {error && (
                            <div className="bg-white p-12 rounded-[3.5rem] border border-slate-100 shadow-xl text-center animate-in fade-in slide-in-from-top-4">
                                <div className="mb-4 inline-flex p-4 bg-slate-50 rounded-full">
                                    <i data-lucide="info" className="w-8 h-8 text-slate-400"></i>
                                </div>
                                <p className="text-slate-500 font-bold text-xl leading-relaxed">{error}</p>
                            </div>
                        )}

                        {selectedResult && (
                            <div className="bg-white rounded-[4rem] shadow-2xl overflow-hidden border border-red-50 animate-in zoom-in-95 duration-500">
                                <div className="bg-gradient-to-br from-red-600 to-red-700 p-10 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white/20 p-3 rounded-2xl">
                                            <i data-lucide="alert-triangle" className="w-8 h-8"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black tracking-tight">অডিট নির্বাচিত!</h2>
                                            <p className="text-red-100 text-[10px] font-bold uppercase tracking-[0.2em] opacity-80 mt-1">Audit Selection 2023-24</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-black uppercase opacity-60">Serial No</p>
                                        <p className="text-4xl font-mono font-black leading-none">{selectedResult.serial}</p>
                                    </div>
                                </div>
                                <div className="p-14 space-y-12">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 text-center md:text-left">
                                        <div>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">TIN Number</span>
                                            <p className="text-5xl font-mono font-black text-slate-900 tracking-tighter">{selectedResult.tin}</p>
                                        </div>
                                        <div>
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Tax Zone</span>
                                            <p className="text-2xl font-black text-slate-800 leading-tight">{selectedResult.zone}</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-10 rounded-[3rem] border border-slate-100 text-center">
                                        <p className="text-slate-600 font-bold text-lg mb-2">
                                            অডিট নোটিশের প্রস্তুতির জন্য আপনার আয়কর নথিপত্র গুছিয়ে রাখুন।
                                        </p>
                                        <p className="text-slate-400 text-sm">সংশ্লিষ্ট কর সার্কেলের সাথে যোগাযোগ করে বিস্তারিত জেনে নিন।</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-24 text-center px-6">
                        <p className="text-slate-300 text-[10px] font-black uppercase tracking-[0.4em] mb-4">
                            Official Data Source: NBR Publication
                        </p>
                        <p className="text-slate-200 text-[11px] max-w-md mx-auto leading-relaxed">
                            তথ্যসূত্র: জাতীয় রাজস্ব বোর্ড (NBR) এর অডিট সিলেকশন গেজেট ২০২৩-২৪। এটি একটি ব্যক্তিগত উদ্যোগ, তথ্যের চূড়ান্ত সত্যতা যাচাইয়ে অফিসিয়াল পোর্টালে যোগাযোগ করুন।
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
