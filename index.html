<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এনবিআর অডিট যাচাইকরণ পোর্টাল | অফিশিয়াল ট্র্যাকার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #fcfdfe; }
        .stat-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); }
        .info-card { transition: all 0.4s ease; }
        .info-card:hover { border-color: #10b981; background: #f0fdf4; }
        .chat-container { height: 500px; }
        @media (max-width: 640px) { .chat-container { height: 80vh; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACPKSjZoziLx221xbi9i3VNutmOsRzmEw",
            authDomain: "nbr-audit-checker.firebaseapp.com",
            projectId: "nbr-audit-checker",
            storageBucket: "nbr-audit-checker.firebasestorage.app",
            messagingSenderId: "150898490409",
            appId: "1:150898490409:web:b2fb490143166ea6647038"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.fb = { db, auth, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, signInAnonymously };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [auditMap, setAuditMap] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);
            
            // AI States
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [geminiApiKey, setGeminiApiKey] = useState("");
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'আসসালামু আলাইকুম! আমি আপনার এনবিআর ট্যাক্স অডিট সহকারী। অডিট সম্পর্কিত যেকোনো প্রশ্ন আমাকে করতে পারেন।' }
            ]);
            const [input, setInput] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const chatEndRef = useRef(null);

            const [liveStats, setLiveStats] = useState({
                totalInFile: 0,
                searches: 0,
                visits: 0
            });

            const appId = "nbr-audit-v1";

            useEffect(() => {
                const { db, auth, doc, getDoc, setDoc, updateDoc, increment, onSnapshot, signInAnonymously } = window.fb;

                const initAuth = async () => {
                    await signInAnonymously(auth);
                    
                    // Fetch Gemini API Key from specified path
                    const keyDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'api_keys', 'gemini');
                    try {
                        const keySnap = await getDoc(keyDocRef);
                        if (keySnap.exists()) {
                            setGeminiApiKey(keySnap.data().key);
                        }
                    } catch (e) {
                        console.error("API Key Fetch Error:", e);
                    }

                    // Analytics & Realtime Stats
                    const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'analytics', 'global_stats');
                    updateDoc(statsRef, { visits: increment(1) }).catch(() => setDoc(statsRef, { visits: 1, searches: 0 }, { merge: true }));
                    onSnapshot(statsRef, (snap) => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setLiveStats(prev => ({ ...prev, searches: data.searches || 0, visits: data.visits || 0 }));
                        }
                    });
                };

                initAuth();

                fetch("https://raw.githubusercontent.com/amiarafat/nbr-audit/refs/heads/main/audit_selection_2023_24.json")
                    .then(res => res.json())
                    .then(data => {
                        const lookup = new Map();
                        data.entries.forEach(e => lookup.set(String(e.tin).trim(), e));
                        setAuditMap(lookup);
                        setLiveStats(prev => ({ ...prev, totalInFile: data.entries.length }));
                        setTimeout(() => lucide.createIcons(), 100);
                    });
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSearch = async () => {
                const tin = searchTerm.trim();
                if (tin.length !== 12) { setError("অনুগ্রহ করে সঠিক ১২ ডিজিটের টিআইএন (TIN) প্রদান করুন।"); return; }
                setLoading(true);
                setError(null);
                setResult(null);

                const { db, doc, updateDoc, increment } = window.fb;
                const statsRef = doc(db, 'artifacts', appId, 'public', 'data', 'analytics', 'global_stats');
                updateDoc(statsRef, { searches: increment(1) });

                setTimeout(() => {
                    const match = auditMap.get(tin);
                    if (match) setResult(match);
                    else setError("দুঃখিত, এই টিআইএন (TIN) নম্বরটি ২০২৩-২৪ অডিট তালিকায় পাওয়া যায়নি।");
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 50);
                }, 800);
            };

            const askGemini = async (userMsg) => {
                const query = userMsg || input;
                if (!query.trim()) return;

                const newMessages = [...messages, { role: 'user', content: query }];
                setMessages(newMessages);
                setInput('');
                setAiLoading(true);

                if (!geminiApiKey) {
                    setMessages([...newMessages, { role: 'assistant', content: "সিস্টেম কনফিগারেশনে ত্রুটি: API Key পাওয়া যায়নি।" }]);
                    setAiLoading(false);
                    return;
                }

                const systemPrompt = "You are an expert Tax Consultant for Bangladesh NBR laws. Answer in Bangla (Bengali). Help users understand audit procedures clearly and professionally.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setMessages([...newMessages, { role: 'assistant', content: text || "দুঃখিত, উত্তর পাওয়া যায়নি।" }]);
                } catch (err) {
                    setMessages([...newMessages, { role: 'assistant', content: "এআই সংযোগে ত্রুটি হয়েছে। আবার চেষ্টা করুন।" }]);
                } finally {
                    setAiLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 py-4 px-6">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-slate-900 text-white p-2 rounded-lg">
                                    <i data-lucide="shield-check" className="w-5 h-5"></i>
                                </div>
                                <span className="font-bold text-xl tracking-tight text-slate-800">এনবিআর অডিট <span className="text-emerald-600">পোর্টাল</span></span>
                            </div>
                            <div className="hidden md:flex items-center gap-4">
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">অর্থবছর ২০২৩-২৪</span>
                                <div className="h-4 w-[1px] bg-slate-200"></div>
                                <div className="flex items-center gap-2 text-emerald-600 font-bold text-xs">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                    লাইভ ডাটাবেস
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto mt-12 px-6">
                        <div className="text-center mb-10">
                            <h1 className="text-4xl md:text-6xl font-black text-slate-900 mb-4 tracking-tight leading-tight">
                                অডিট নির্বাচনের <span className="text-emerald-600 underline decoration-slate-200 underline-offset-8">অবস্থা</span> যাচাই
                            </h1>
                            <p className="text-slate-500 text-lg max-w-2xl mx-auto font-medium leading-relaxed">
                                জাতীয় রাজস্ব বোর্ড (NBR) এর ২০২৩-২৪ অডিট তালিকায় আপনার ১২ ডিজিটের টিআইএন (TIN) আছে কিনা তা কয়েক সেকেন্ডে নিশ্চিত করুন।
                            </p>
                        </div>

                        <div className="relative mb-12 max-w-3xl mx-auto">
                            <div className="bg-white p-3 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 flex flex-col md:flex-row items-center gap-2">
                                <div className="flex-1 flex items-center w-full px-6">
                                    <i data-lucide="hash" className="text-slate-300 mr-4 w-6 h-6"></i>
                                    <input 
                                        className="w-full py-5 text-2xl font-bold outline-none text-slate-800 placeholder:text-slate-200"
                                        placeholder="আপনার টিআইএন নম্বর দিন..."
                                        value={searchTerm}
                                        maxLength={12}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                                    />
                                </div>
                                <button 
                                    onClick={handleSearch}
                                    disabled={loading}
                                    className="w-full md:w-auto bg-slate-900 text-white px-10 py-5 rounded-[1.8rem] font-bold hover:bg-emerald-600 transition-all flex items-center justify-center gap-2 shadow-lg disabled:opacity-50"
                                >
                                    {loading ? <i data-lucide="loader-2" className="animate-spin w-5 h-5"></i> : <i data-lucide="search" className="w-5 h-5"></i>}
                                    {loading ? "সার্চ হচ্ছে..." : "যাচাই করুন"}
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
                            <div className="bg-white p-6 rounded-3xl stat-card flex items-center gap-4">
                                <div className="bg-blue-50 p-3 rounded-xl text-blue-600"><i data-lucide="users" className="w-5 h-5"></i></div>
                                <div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">মোট ভিজিট</p>
                                    <h3 className="text-2xl font-black text-slate-900">{liveStats.visits.toLocaleString('bn-BD')}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl stat-card flex items-center gap-4">
                                <div className="bg-emerald-50 p-3 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-5 h-5"></i></div>
                                <div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">টিআইএন সার্চ</p>
                                    <h3 className="text-2xl font-black text-slate-900">{liveStats.searches.toLocaleString('bn-BD')}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl stat-card flex items-center gap-4">
                                <div className="bg-amber-50 p-3 rounded-xl text-amber-600"><i data-lucide="database" className="w-5 h-5"></i></div>
                                <div>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">ডাটাবেস সাইজ</p>
                                    <h3 className="text-2xl font-black text-slate-900">{liveStats.totalInFile.toLocaleString('bn-BD')}</h3>
                                </div>
                            </div>
                        </div>

                        <div className="max-w-4xl mx-auto min-h-[100px]">
                            {error && (
                                <div className="bg-slate-100 text-slate-600 p-8 rounded-[2.5rem] font-bold border border-slate-200 text-center animate-in fade-in slide-in-from-top-2">
                                    <div className="bg-white w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-slate-400">
                                        <i data-lucide="info" className="w-6 h-6"></i>
                                    </div>
                                    <p className="text-lg">{error}</p>
                                </div>
                            )}

                            {result && (
                                <div className="bg-white rounded-[4rem] shadow-2xl overflow-hidden border border-red-50 animate-in zoom-in-95 duration-500 mb-16">
                                    <div className="bg-red-600 p-10 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                                        <div className="flex items-center gap-6 text-center md:text-left">
                                            <div className="bg-white/20 p-4 rounded-2xl backdrop-blur-md shrink-0">
                                                <i data-lucide="alert-triangle" className="w-10 h-10"></i>
                                            </div>
                                            <div>
                                                <h2 className="text-3xl font-black">অডিট নির্বাচিত!</h2>
                                                <p className="text-red-100 text-[10px] font-bold uppercase tracking-[0.2em] opacity-80">অডিট চূড়ান্ত নির্বাচন তালিকা</p>
                                            </div>
                                        </div>
                                        <div className="bg-black/10 px-8 py-4 rounded-2xl border border-white/10 text-center w-full md:w-auto">
                                            <p className="text-[10px] font-black uppercase opacity-60 mb-1 tracking-widest">তালিকা নম্বর</p>
                                            <p className="text-4xl font-black"># {result.serial.toLocaleString('bn-BD')}</p>
                                        </div>
                                    </div>
                                    <div className="p-12 grid grid-cols-1 md:grid-cols-2 gap-12">
                                        <div className="space-y-1 text-center md:text-left">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">টিআইএন নম্বর</p>
                                            <p className="text-5xl font-black text-slate-900 tracking-tighter">{result.tin}</p>
                                        </div>
                                        <div className="space-y-1 text-center md:text-left">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">কর সার্কেল / অঞ্চল</p>
                                            <p className="text-2xl font-black text-slate-800 leading-tight">{result.zone}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-red-50 p-10 border-t border-red-100">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                                            <h4 className="text-red-900 font-black text-xl flex items-center gap-2">
                                                <i data-lucide="clipboard-list" className="w-6 h-6"></i>
                                                অডিট নির্বাচনের পরবর্তী ধাপ:
                                            </h4>
                                            <button 
                                                onClick={() => { setIsChatOpen(true); askGemini(`আমার টিআইএন ${result.tin} অডিটের জন্য নির্বাচিত হয়েছে (${result.zone})। পরবর্তী পদক্ষেপগুলো কী কী?`); }}
                                                className="bg-white text-slate-900 text-xs font-black px-6 py-3 rounded-full shadow-sm hover:shadow-md border border-red-100 flex items-center gap-2"
                                            >
                                                ✨ এআই পরামর্শ নিন
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-12 mb-20">
                            <div className="bg-white p-10 rounded-[3.5rem] border border-slate-100 shadow-sm info-card">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="bg-emerald-100 text-emerald-600 p-4 rounded-3xl">
                                        <i data-lucide="file-check-2" className="w-8 h-8"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-900">প্রয়োজনীয় দলিলাদি</h3>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">অডিট প্রস্তুতির চেকলিস্ট</p>
                                    </div>
                                </div>
                                <ul className="space-y-4">
                                    {["ইনকাম ট্যাক্স রিটার্ন কপি", "ব্যাংক স্টেটমেন্ট", "বিনিয়োগের প্রমাণ", "সম্পত্তির দলিলাদি", "বেতন সার্টিফিকেট", "ব্যবসার ক্যাশ বুক"].map((item, index) => (
                                        <li key={index} className="flex items-start gap-4 p-4 rounded-2xl bg-slate-50 border border-transparent hover:border-slate-200 transition-all">
                                            <div className="bg-emerald-500 text-white p-1 rounded-full shrink-0 mt-1"><i data-lucide="check" className="w-3 h-3"></i></div>
                                            <span className="text-slate-700 font-semibold">{item}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="bg-white p-10 rounded-[3.5rem] border border-slate-100 shadow-sm info-card">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="bg-amber-100 text-amber-600 p-4 rounded-3xl"><i data-lucide="help-circle" className="w-8 h-8"></i></div>
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-900">অডিট কেন হয়?</h3>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">প্রক্রিয়াটি বুঝতে সাহায্য করবে</p>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="p-6 rounded-3xl bg-amber-50/50 border border-amber-100">
                                        <h5 className="font-black text-amber-900 mb-2">১. র‍্যান্ডম সিলেকশন</h5>
                                        <p className="text-slate-600 text-sm leading-relaxed font-medium">সিস্টেম জেনারেটেড লটারির মাধ্যমে অডিট নির্বাচিত হয়।</p>
                                    </div>
                                    <div className="p-6 rounded-3xl bg-blue-50/50 border border-blue-100">
                                        <h5 className="font-black text-blue-900 mb-2">২. তথ্যের গরমিল</h5>
                                        <p className="text-slate-600 text-sm leading-relaxed font-medium">রিটার্নের সাথে ব্যাংক ট্রানজ্যাকশনের অসামঞ্জস্য থাকলে অডিট হতে পারে।</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Floating Chat Interface */}
                    <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
                        {isChatOpen && (
                            <div className="bg-white w-[90vw] sm:w-[400px] rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden mb-4 flex flex-col animate-in slide-in-from-bottom-5 duration-300">
                                <div className="bg-slate-900 p-6 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500 p-2 rounded-xl text-white"><i data-lucide="bot" className="w-5 h-5"></i></div>
                                        <div>
                                            <h4 className="font-black text-sm">ট্যাক্স এআই বিশেষজ্ঞ</h4>
                                            <span className="text-[9px] text-emerald-400 uppercase font-black tracking-widest flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> অনলাইনে আছেন
                                            </span>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)} className="hover:bg-white/10 p-2 rounded-full transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="chat-container flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-2xl text-sm font-medium shadow-sm leading-relaxed ${
                                                m.role === 'user' 
                                                ? 'bg-slate-900 text-white rounded-tr-none' 
                                                : 'bg-white text-slate-800 border border-slate-100 rounded-tl-none'
                                            }`}>
                                                {m.content}
                                            </div>
                                        </div>
                                    ))}
                                    {aiLoading && <div className="flex justify-start"><div className="bg-white border p-3 rounded-2xl text-[10px] font-black text-emerald-600 animate-pulse uppercase tracking-widest">এআই ভাবছে...</div></div>}
                                    <div ref={chatEndRef}></div>
                                </div>

                                <div className="p-4 bg-white border-t border-slate-100">
                                    <div className="flex items-center gap-2 bg-slate-100 rounded-2xl px-4 py-2 focus-within:ring-2 focus-within:ring-emerald-200 transition-all">
                                        <input 
                                            className="flex-1 bg-transparent border-none outline-none py-2 text-sm font-semibold"
                                            placeholder="আপনার প্রশ্ন লিখুন..."
                                            value={input}
                                            onChange={e => setInput(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && askGemini()}
                                        />
                                        <button onClick={() => askGemini()} disabled={aiLoading} className="bg-slate-900 text-white p-2 rounded-xl hover:bg-emerald-600 transition-all shadow-md">
                                            <i data-lucide="send" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                        <button 
                            onClick={() => setIsChatOpen(!isChatOpen)}
                            className="bg-slate-900 text-white p-5 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all flex items-center gap-3 group relative overflow-hidden"
                        >
                            <div className="absolute inset-0 bg-emerald-600 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                            <div className="relative z-10 flex items-center gap-3">
                                <i data-lucide="sparkles" className="w-6 h-6 text-emerald-400"></i>
                                {!isChatOpen && <span className="font-black text-xs uppercase tracking-widest pr-2 hidden sm:block">এআই পরামর্শক</span>}
                            </div>
                        </button>
                    </div>

                    <footer className="mt-32 text-center px-6 pb-12">
                        <div className="max-w-2xl mx-auto space-y-4">
                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">অফিশিয়াল অডিট নোড • এনবিআর ডাটা কানেক্টর</p>
                            <p className="text-xs text-slate-400 font-medium leading-relaxed">এই অ্যাপ্লিকেশনটি কেবল ব্যক্তিগত অডিট অবস্থা যাচাইয়ের জন্য। অফিশিয়াল গেজেটই চূড়ান্ত হিসেবে গণ্য হবে।</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
